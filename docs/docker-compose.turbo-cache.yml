version: '3.8'

services:
  # Turborepo Remote Cache Server
  turbo-cache:
    image: fox1t/turborepo-remote-cache:latest
    container_name: turbo-cache
    ports:
      - "3001:3000"
    environment:
      # Security token - change this in production
      TURBO_TOKEN: ${TURBO_TOKEN:-dev-secret-change-me}
      
      # Storage configuration
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_PATH: /cache
      
      # Optional: S3 configuration (uncomment if using S3)
      # S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      # S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      # S3_BUCKET: ${S3_BUCKET:-turbo-cache}
      # S3_REGION: ${S3_REGION:-us-east-1}
      # S3_ENDPOINT: ${S3_ENDPOINT}  # For R2, Minio, etc.
      
      # Cache retention (optional)
      # CACHE_TTL: 604800  # 7 days in seconds
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    
    volumes:
      - turbo-cache-data:/cache
    
    restart: unless-stopped
    
    networks:
      - turbo-network

volumes:
  turbo-cache-data:
    driver: local

networks:
  turbo-network:
    driver: bridge
